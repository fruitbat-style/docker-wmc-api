services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - wmc-net

  api:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    ports:
      - "5232:5232"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5232
      DOTNET_USE_POLLING_FILE_WATCHER: "true"
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
    volumes:
      - ./api:/app
      - /app/bin
      - /app/obj
    depends_on:
      db:
        condition: service_healthy
    networks:
      - wmc-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    environment:
      - VITE_GOOGLE_MAPS_API_KEY=${VITE_GOOGLE_MAPS_API_KEY}
      - API_URL=http://api:5232
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api
    networks:
      - wmc-net

  wmc-admin:
    build:
      context: ./wmc-admin
      dockerfile: Dockerfile.dev
    ports:
      - "5174:5174"
    environment:
      - VITE_GOOGLE_MAPS_API_KEY=${VITE_GOOGLE_MAPS_API_KEY}
      - API_URL=http://api:5232
    volumes:
      - ./wmc-admin:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
    networks:
      - wmc-net

volumes:
  pgdata:

networks:
  wmc-net:
    driver: bridge
